  - type: Features
    data:
      - name: Cardano Blockchain Access
        description: >-
          Query blocks, transactions, slots, epochs, accounts, and addresses on the
          Cardano mainnet and testnet networks.
      - name: Native Asset Support
        description: >-
          Full support for Cardano native assets including fungible tokens, NFTs,
          and multi-asset UTXOs with on-chain metadata (CIP-25, CIP-68).
      - name: Stake Pool and Delegation Data
        description: >-
          Query stake pool information, delegation history, rewards, and account
          activity for Cardano staking workflows.
      - name: Governance Data
        description: >-
          Access Cardano governance data including proposals, DRep registrations,
          and voting activity introduced in the Conway era.
      - name: IPFS Integration
        description: >-
          Built-in IPFS API for storing and retrieving off-chain NFT metadata and
          other content via Blockfrost's IPFS gateway.
      - name: Multi-Network Support
        description: >-
          Single API surface covering Cardano mainnet, preview testnet, preprod
          testnet, and the Midnight blockchain.
      - name: Transaction Submission
        description: >-
          Submit signed transactions directly to the Cardano network via the
          Blockfrost API without running a local node.
  - type: UseCases
    data:
      - name: dApp Development
        description: >-
          Developers build Cardano dApps using Blockfrost to query blockchain state,
          submit transactions, and interact with smart contracts.
      - name: NFT Platform Integration
        description: >-
          NFT marketplaces and minting platforms use Blockfrost to track asset minting,
          transfers, and metadata across the Cardano network.
      - name: DeFi Protocol Building
        description: >-
          DeFi protocols integrate Blockfrost to monitor liquidity pool states,
          track DEX transactions, and manage smart contract interactions.
      - name: Wallet Development
        description: >-
          Cardano wallet applications use Blockfrost to fetch UTXOs, balances,
          transaction history, and submit transactions.
      - name: Blockchain Analytics
        description: >-
          Analytics platforms query Blockfrost for on-chain data including block
          history, epoch statistics, and network activity metrics.
  - type: Integrations
    data:
      - name: Mesh SDK
        description: >-
          The Mesh JavaScript/TypeScript SDK integrates with Blockfrost as a provider
          for Cardano dApp development.
      - name: Lucid Evolution
        description: >-
          Lucid Evolution (TypeScript library) supports Blockfrost as a blockchain
          provider for transaction building and submission.
      - name: PyCardano
        description: >-
          PyCardano Python library uses Blockfrost as a chain context provider for
          Cardano smart contract development.
      - name: Cardano Serialization Library
        description: >-
          The Cardano Serialization Library (CSL) pairs with Blockfrost for
          transaction construction and UTXO management.
