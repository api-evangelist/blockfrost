apis:
  - aid: blockfrost:blockfrost
    name: Blockfrost API
    description: >-
      RESTful API for interacting with the Cardano blockchain and parts of its ecosystem.
      Provides access to blocks, transactions, accounts, addresses, native assets, epochs,
      governance data, and IPFS. Requires a project_id obtained from blockfrost.io for
      authentication. Supports Cardano mainnet, preview testnet, preprod testnet,
      and Midnight mainnet networks.
