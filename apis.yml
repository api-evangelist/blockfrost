name: Blockfrost
description: >-
  Blockfrost is a RESTful API service providing access to the Cardano blockchain and its
  ecosystem. It serves as an infrastructure layer for developers building dApps, wallets,
  NFT platforms, DeFi protocols, and analytics tools on Cardano. Blockfrost provides
  endpoints for querying blocks, transactions, accounts, addresses, native assets,
  epochs, governance data, and IPFS storage, supporting both mainnet and testnet networks.
