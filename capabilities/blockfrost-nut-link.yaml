naftiko: 1.0.0-alpha2
info:
  label: Blockfrost.io ~ API Documentation — Nut.link
  description: 'Blockfrost.io ~ API Documentation — Nut.link. 4 operations. Lead operation: Blockfrost Specific Ticker. Self-contained
    Naftiko capability covering one Blockfrost business surface.'
  tags:
  - Blockfrost
  - Nut.link
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BLOCKFROST_API_KEY: BLOCKFROST_API_KEY
capability:
  consumes:
  - type: http
    namespace: blockfrost-nut-link
    baseUri: https://cardano-mainnet.blockfrost.io/api/v0
    description: Blockfrost.io ~ API Documentation — Nut.link business capability. Self-contained, no shared references.
    resources:
    - name: nutlink-tickers-ticker
      path: /nutlink/tickers/{ticker}
      operations:
      - name: get
        method: GET
        description: Blockfrost Specific Ticker
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: ticker
          in: path
          type: string
          required: true
        - name: count
          in: query
          type: integer
          description: The number of results displayed on one page.
        - name: page
          in: query
          type: integer
          description: The page number for listing the results.
        - name: order
          in: query
          type: string
          description: The ordering of items from the point of view of the blockchain,
    - name: nutlink-address
      path: /nutlink/{address}
      operations:
      - name: get
        method: GET
        description: Blockfrost Specific Nut.link Address
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: address
          in: path
          type: string
          required: true
    - name: nutlink-address-tickers
      path: /nutlink/{address}/tickers
      operations:
      - name: get
        method: GET
        description: Blockfrost List of Tickers of an Oracle
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: address
          in: path
          type: string
          required: true
        - name: count
          in: query
          type: integer
          description: The number of results displayed on one page.
        - name: page
          in: query
          type: integer
          description: The page number for listing the results.
        - name: order
          in: query
          type: string
          description: The ordering of items from the point of view of the blockchain,
    - name: nutlink-address-tickers-ticker
      path: /nutlink/{address}/tickers/{ticker}
      operations:
      - name: get
        method: GET
        description: Blockfrost Specific Ticker for an Address
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: address
          in: path
          type: string
          required: true
        - name: ticker
          in: path
          type: string
          required: true
        - name: count
          in: query
          type: integer
          description: The number of results displayed on one page.
        - name: page
          in: query
          type: integer
          description: The page number for listing the results.
        - name: order
          in: query
          type: string
          description: The ordering of items from the point of view of the blockchain,
    authentication:
      type: apikey
      key: project_id
      value: '{{env.BLOCKFROST_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: blockfrost-nut-link-rest
    port: 8080
    description: REST adapter for Blockfrost.io ~ API Documentation — Nut.link. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/nutlink/tickers/{ticker}
      name: nutlink-tickers-ticker
      description: REST surface for nutlink-tickers-ticker.
      operations:
      - method: GET
        name: get
        description: Blockfrost Specific Ticker
        call: blockfrost-nut-link.get
        with:
          ticker: rest.ticker
          count: rest.count
          page: rest.page
          order: rest.order
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/nutlink/{address}
      name: nutlink-address
      description: REST surface for nutlink-address.
      operations:
      - method: GET
        name: get
        description: Blockfrost Specific Nut.link Address
        call: blockfrost-nut-link.get
        with:
          address: rest.address
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/nutlink/{address}/tickers
      name: nutlink-address-tickers
      description: REST surface for nutlink-address-tickers.
      operations:
      - method: GET
        name: get
        description: Blockfrost List of Tickers of an Oracle
        call: blockfrost-nut-link.get
        with:
          address: rest.address
          count: rest.count
          page: rest.page
          order: rest.order
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/nutlink/{address}/tickers/{ticker}
      name: nutlink-address-tickers-ticker
      description: REST surface for nutlink-address-tickers-ticker.
      operations:
      - method: GET
        name: get
        description: Blockfrost Specific Ticker for an Address
        call: blockfrost-nut-link.get
        with:
          address: rest.address
          ticker: rest.ticker
          count: rest.count
          page: rest.page
          order: rest.order
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: blockfrost-nut-link-mcp
    port: 9090
    transport: http
    description: MCP adapter for Blockfrost.io ~ API Documentation — Nut.link. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: blockfrost-specific-ticker
      description: Blockfrost Specific Ticker
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: blockfrost-nut-link.get
      with:
        ticker: tools.ticker
        count: tools.count
        page: tools.page
        order: tools.order
      outputParameters:
      - type: object
        mapping: $.
    - name: blockfrost-specific-nut-link-address
      description: Blockfrost Specific Nut.link Address
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: blockfrost-nut-link.get
      with:
        address: tools.address
      outputParameters:
      - type: object
        mapping: $.
    - name: blockfrost-list-tickers-oracle
      description: Blockfrost List of Tickers of an Oracle
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: blockfrost-nut-link.get
      with:
        address: tools.address
        count: tools.count
        page: tools.page
        order: tools.order
      outputParameters:
      - type: object
        mapping: $.
    - name: blockfrost-specific-ticker-address
      description: Blockfrost Specific Ticker for an Address
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: blockfrost-nut-link.get
      with:
        address: tools.address
        ticker: tools.ticker
        count: tools.count
        page: tools.page
        order: tools.order
      outputParameters:
      - type: object
        mapping: $.
