      description: Blockfrost Add a File to IPFS
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: blockfrost-ipfs-add.ipfsadd
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
